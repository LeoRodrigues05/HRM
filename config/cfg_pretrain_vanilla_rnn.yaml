# Baseline training config — Vanilla RNN on Sudoku-Extreme
# Matches HRM training hyperparameters exactly

defaults:
  - arch: vanilla_rnn
  - _self_

hydra:
  output_subdir: null

# Data path (same as HRM)
data_path: data/sudoku-extreme-1k-aug-1000

# Hyperparams — identical to HRM training
global_batch_size: 768

epochs: 40000
eval_interval: 4000
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 1.0
puzzle_emb_weight_decay: 1.0

puzzle_emb_lr: 1e-4

project_name: Sudoku-extreme-baselines
checkpoint_path: checkpoints/baselines/vanilla_rnn
