# Stock HRM (one-step gradient) on Sudoku-Extreme.
# Paired with cfg_pretrain_hrm_bptt.yaml — identical settings except the arch.
# Hyperparameters follow the HRM Sudoku-Extreme recipe in docs/EXPERIMENTS.md.

defaults:
  - arch: hrm_v1
  - _self_

hydra:
  output_subdir: null

data_path: data/sudoku-extreme-1k-aug-1000

# Hyperparams — Training
global_batch_size: 768

epochs: 20000
eval_interval: 2000
checkpoint_every_eval: True
# Save full state (model+optimizers+step) every N steps so a preempted/requeued
# job resumes from here instead of restarting (cscc-gpu-qos is preemptible).
checkpoint_steps: 500

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 1.0
puzzle_emb_weight_decay: 1.0

puzzle_emb_lr: 1e-4

# Identical seed across stock/bptt for a controlled comparison
seed: 0

project_name: Sudoku-extreme-bptt-study
run_name: hrm_stock
checkpoint_path: checkpoints/bptt_study/hrm_stock
