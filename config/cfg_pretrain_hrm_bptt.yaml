# BPTT HRM (within-step back-propagation through time) on Sudoku-Extreme.
# Paired with cfg_pretrain_hrm_stock.yaml — identical settings except the arch
# (hrm_v1_bptt sets one_step_grad: false).

defaults:
  - arch: hrm_v1_bptt
  - _self_

hydra:
  output_subdir: null

data_path: data/sudoku-extreme-1k-aug-1000

# Hyperparams — Training
global_batch_size: 768

epochs: 20000
eval_interval: 2000
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 1.0
puzzle_emb_weight_decay: 1.0

puzzle_emb_lr: 1e-4

# Identical seed across stock/bptt for a controlled comparison
seed: 0

project_name: Sudoku-extreme-bptt-study
run_name: hrm_bptt
checkpoint_path: checkpoints/bptt_study/hrm_bptt
