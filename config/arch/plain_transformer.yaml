name: baselines.plain_transformer@PlainTransformerModel
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

# No recurrence — single forward pass
halt_exploration_prob: 0.0
halt_max_steps: 1

num_layers: 8        # 8 transformer layers, single pass (~27.3M params)

hidden_size: 512
num_heads: 8
expansion: 4

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope
