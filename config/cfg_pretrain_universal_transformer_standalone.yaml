# Baseline training config -- Standalone Universal Transformer on Sudoku-Extreme
# No ACT, no deep supervision, no one-step gradient approximation.

defaults:
  - arch: universal_transformer_standalone
  - _self_

hydra:
  output_subdir: null

data_path: data/sudoku-extreme-1k-aug-1000

# NOTE: full BPTT through 16 iterations is memory-heavy.
# If you OOM, reduce global_batch_size (e.g. to 384 or 192).
global_batch_size: 768

epochs: 40000
eval_interval: 4000
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 1.0
puzzle_emb_weight_decay: 1.0

puzzle_emb_lr: 1e-4

project_name: Sudoku-extreme-baselines
checkpoint_path: checkpoints/baselines/universal_transformer_standalone
