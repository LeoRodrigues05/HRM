name: baselines.vanilla_rnn@VanillaRNNModel
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

halt_exploration_prob: 0.1
halt_max_steps: 16

num_layers: 8        # 8 flat layers (same total as HRM's 4H + 4L)
num_iterations: 4    # 4 iterations per ACT step (matches HRM's H_cycles * L_cycles = 2*2 = 4)

hidden_size: 512
num_heads: 8
expansion: 4

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope
