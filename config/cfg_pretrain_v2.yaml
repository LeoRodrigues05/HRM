# HRM v2 Training Configuration for Sudoku
# Based on the original config but with v2 model

defaults:
  - _self_

hydra:
  output_subdir: null

# Architecture
arch:
  name: hrm_v2.hrm_v2@HierarchicalReasoningModel_V2
  
  # Base architecture (same as v1)
  H_cycles: 2
  L_cycles: 2
  H_layers: 4
  L_layers: 4
  hidden_size: 512
  num_heads: 8
  expansion: 4
  pos_encodings: rope
  rope_theta: 10000.0
  rms_norm_eps: 1e-5
  halt_max_steps: 16
  halt_exploration_prob: 0.1
  puzzle_emb_ndim: 512
  forward_dtype: bfloat16
  
  # V2 additions: Structural inductive biases
  use_sparse_attention: true
  sparse_attention_layers: "L"  # L-level uses sparse, H-level uses full
  
  use_constraint_head: true
  constraint_head_weight: 0.5
  use_violation_loss: true
  violation_loss_weight: 0.1
  
  use_gnn_layers: true
  gnn_type: "mpnn"
  gnn_layers_per_level: 1
  gnn_interleave: true
  gnn_edge_dim: 32
  
  # Loss head
  loss:
    name: hrm_v2.act_loss_head@ACTLossHeadV2
    loss_type: stablemax_cross_entropy
    constraint_loss_weight: 0.5
    violation_loss_weight: 0.1

# Data path
data_path: data/sudoku-extreme-1k-aug-1000

# Hyperparams - Training
global_batch_size: 64  # Smaller batch for faster iteration
epochs: 50
eval_interval: 500
checkpoint_every_eval: true

lr: 1e-4
lr_min_ratio: 0.1
lr_warmup_steps: 200

# Standard hyperparameter settings
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1
puzzle_emb_lr: 1e-2

# Checkpoint
project_name: HRM_v2_Sudoku
run_name: null  # Auto-generated
checkpoint_path: Checkpoint_HRM_v2_Sudoku

# Extras
seed: 42
eval_save_outputs:
  - intermediate_preds_step
